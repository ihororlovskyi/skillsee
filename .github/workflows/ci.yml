name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run node_modules/.bin/biome check src/

      - name: Unit tests
        run: bun run node_modules/.bin/vitest run

      - name: Build
        run: bun run node_modules/.bin/bunup

      - name: e2e tests
        run: bun run node_modules/.bin/vitest run --config vitest.e2e.config.ts
